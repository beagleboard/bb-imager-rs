name: bb-imager
base: core24 # the base snap is the execution environment for this snap
version: 1.0.12
adopt-info: bb-imager
contact:
  - https://www.beagleboard.org/collaborate

grade: stable # must be 'stable' to release into candidate/stable channels
confinement: strict # use 'strict' once you have the right plugs and slots

parts:
  # Snapcraft 9.0 Rust plugin validates that 'rustup' is available at pull time
  # BEFORE running override-build. When building on Launchpad (clean container
  # with no pre-installed Rust toolchain), the validation fails because rustup
  # isn't on PATH yet. Since we use override-build anyway (to control feature
  # flags and LTO), just install Rust here and use plugin: nil for the main part.
  rust-deps:
    plugin: nil
    override-pull: |
      curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
    build-packages:
      - curl
    prime:
      - -*

  bb-imager:
    plugin: nil
    source: .
    after: [rust-deps]
    build-packages:
      - libudev-dev
      - libssl-dev
      - libsqlite3-dev
      - libclang-dev
      - desktop-file-utils
    parse-info:
      - usr/share/metainfo/org.beagleboard.imagingutility.metainfo.xml
    override-build: |
      # Ensure cargo/rustc from rust-deps are on PATH
      export PATH="$HOME/.cargo/bin:$PATH"
      source .envrc
      make build-gui _install_gui DESTDIR=${CRAFT_PART_INSTALL} PREFIX=/usr SYSTEM_DEPS=1 GUI_NAME=org.beagleboard.imagingutility ZEPTO_I2C=0 BCF_MSP430=0 NOTIFY_RUST=0 PRE_RELEASE=$PRE_RELEASE

apps:
  bb-imager:
    command: usr/bin/bb-imager-gui
    common-id: org.beagleboard.imagingutility
    plugs:
      # Downloading firmware/iso from network.
      - network
      # Used for lsblk.
      - hardware-observe
      # Used for getting mount info when doing lsblk.
      - mount-observe
      # Used for opening SD card device.
      - udisks2
      # BCF and Zepto UART
      - serial-port
    extensions: [gnome]
