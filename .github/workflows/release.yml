name: Create Release artifacts

on:
  push:
    branches: [ "main" ]
    tags: [ "[0-9]+.[0-9]+.[0-9]+" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

defaults:
  run:
    shell: bash

jobs:
  linux:
    strategy:
      matrix:
        platform:
          - runs-on: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

          - runs-on: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu

    name: Build Artifacts - ${{ matrix.platform.target }}
    runs-on: ${{ matrix.platform.runs-on }}
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        lfs: true

    - name: Setup deps
      run: make setup-debian-deps

    - name: Select rust toolchain
      run: rustup toolchain install stable --profile minimal

    - name: Add ${{ matrix.platform.target }} target
      run:  rustup target add ${{ matrix.platform.target }}

    - name: Set version
      if: startsWith(github.ref, 'refs/tags/')
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

    - name: Set PRE_RELEASE Environment Variable
      if: ${{ ! startsWith(github.ref, 'refs/tags/') }}
      run: echo "PRE_RELEASE=1" >> $GITHUB_ENV

    - name: Use caching
      uses: Swatinem/rust-cache@v2
      with:
        prefix-key: "v1"
        
    - name: Install packaging deps
      run: make setup-packaging-deps

    - name: Build packages
      run: make package-${{ matrix.platform.target }}

    # Do not do versioning for Pre-Release packages
    - name: Rename Pre-Release Packages
      if: ${{ ! startsWith(github.ref, 'refs/tags/') }}
      run: make package-rename

    - name: Pre-Release
      uses: softprops/action-gh-release@v3
      if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/') == false
      with:
        prerelease: true
        name: Continuous Release
        tag_name: continuous-release
        files: |
          bb-imager-gui/dist/*
          bb-imager-cli/dist/*
          bb-imager-service/dist/*

    - name: Release
      uses: softprops/action-gh-release@v3
      if: startsWith(github.ref, 'refs/tags/')
      with:
        generate_release_notes: false
        files: |
          bb-imager-gui/dist/*
          bb-imager-cli/dist/*
          bb-imager-service/dist/*

    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      if: github.event_name == 'pull_request'
      with:
        name: artifacts-${{ matrix.platform.target }}
        path: |
          bb-imager-gui/dist/*
          bb-imager-cli/dist/*
          bb-imager-service/dist/*

  linux-cross:
    name: Build Artifacts - armv7-unknown-linux-gnueabihf
    runs-on: ubuntu-24.04
    env:
      NO_BUILD: 1
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        lfs: true

    - name: Set version
      if: startsWith(github.ref, 'refs/tags/')
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

    - name: Set PRE_RELEASE Environment Variable
      if: ${{ ! startsWith(github.ref, 'refs/tags/') }}
      run: echo "PRE_RELEASE=1" >> $GITHUB_ENV

    - name: Build binary
      uses: houseabsolute/actions-rust-cross@v1
      with:
        command: build
        target: armv7-unknown-linux-gnueabihf
        args: "--locked --release -F bcf_msp430,bcf_cc1352p7,dfu,zepto_uart,zepto_i2c -p bb-imager-cli"
        strip: true

    - name: Install packaging deps
      run: make setup-packaging-deps

    - name: Build packages
      run: make package-armv7-unknown-linux-gnueabihf

    # Do not do versioning for Pre-Release packages
    - name: Rename Pre-Release Packages
      if: ${{ ! startsWith(github.ref, 'refs/tags/') }}
      run: make package-rename

    - name: Pre-Release
      uses: softprops/action-gh-release@v3
      if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/') == false
      with:
        prerelease: true
        name: Continuous Release
        tag_name: continuous-release
        files: |
          bb-imager-gui/dist/*
          bb-imager-cli/dist/*
          bb-imager-service/dist/*

    - name: Release
      uses: softprops/action-gh-release@v3
      if: startsWith(github.ref, 'refs/tags/')
      with:
        generate_release_notes: false
        files: |
          bb-imager-gui/dist/*
          bb-imager-cli/dist/*
          bb-imager-service/dist/*

    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      if: github.event_name == 'pull_request'
      with:
        name: artifacts-armv7-unknown-linux-gnueabihf
        path: |
          bb-imager-gui/dist/*
          bb-imager-cli/dist/*
          bb-imager-service/dist/*

  vendor-deps:
    name: Vendor dependencies
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/')
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        lfs: true

    - name: Create dependency tar
      run: make vendor-deps

    - name: Release
      uses: softprops/action-gh-release@v3
      with:
        generate_release_notes: true
        files: cargo-vendor.tar.gz

  macos-job:
    name: Build MacOS Artifacts
    runs-on: macos-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        lfs: true

    - name: Set version
      if: startsWith(github.ref, 'refs/tags/')
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

    - name: Set PRE_RELEASE Environment Variable
      if: ${{ ! startsWith(github.ref, 'refs/tags/') }}
      run: echo "PRE_RELEASE=1" >> $GITHUB_ENV

    - name: Select rust toolchain
      run: rustup toolchain install stable --profile minimal

    - name: Add Rust targets
      run:  rustup target add aarch64-apple-darwin x86_64-apple-darwin

    - name: Use caching
      uses: Swatinem/rust-cache@v2
      with:
        prefix-key: "v2"
        
    - name: Install packaging deps
      run: make setup-packaging-deps

    # The ENV variable names are what cargo-packager requires
    - name: Setup macos signing
      working-directory: bb-imager-gui
      if: github.event_name != 'pull_request'
      run: |
        echo "" >> Cargo.toml
        echo "[package.metadata.packager.macos]" >> Cargo.toml
        echo "signing_identity = \"${{ secrets.TEAM_ID }}\"" >> Cargo.toml

    - name: Build packages
      env:
        APPLE_CERTIFICATE: ${{ secrets.CERT_DEVELOPER_APP_BASE64 }}
        APPLE_CERTIFICATE_PASSWORD: ${{ secrets.CERT_PASSWORD }}
        APPLE_ID: ${{ secrets.APPLE_ID }}
        APPLE_PASSWORD: ${{ secrets.APP_PASSWORD }}
        APPLE_TEAM_ID: ${{ secrets.TEAM_ID }}
      run: make package-x86_64-apple-darwin package-aarch64-apple-darwin

    # Do not do versioning for Pre-Release packages
    - name: Rename Pre-Release Packages
      if: ${{ ! startsWith(github.ref, 'refs/tags/') }}
      run: make package-rename

    - name: Pre-Release
      uses: softprops/action-gh-release@v3
      if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/') == false
      with:
        prerelease: true
        name: Continuous Release
        tag_name: continuous-release
        files: |
          bb-imager-gui/dist/*

    - name: Release
      uses: softprops/action-gh-release@v3
      if: startsWith(github.ref, 'refs/tags/')
      with:
        generate_release_notes: false
        files: |
          bb-imager-gui/dist/*

    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      if: github.event_name == 'pull_request'
      with:
        name: artifacts-macos
        path: |
          bb-imager-gui/dist/*

  windows-job:
    name: Build Windows Artifacts
    runs-on: windows-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        lfs: true

    - name: Set version
      if: startsWith(github.ref, 'refs/tags/')
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

    - name: Set PRE_RELEASE Environment Variable
      if: ${{ ! startsWith(github.ref, 'refs/tags/') }}
      run: echo "PRE_RELEASE=1" >> $GITHUB_ENV

    - name: Select rust toolchain
      run: rustup toolchain install stable --profile minimal

    - name: Add rust target
      run:  rustup target add x86_64-pc-windows-msvc aarch64-pc-windows-msvc

    - name: Use caching
      uses: Swatinem/rust-cache@v2
      with:
        prefix-key: "v1"
        
    - name: Install packaging deps
      run: make setup-packaging-deps

    - name: Build packages
      run: make package-aarch64-pc-windows-msvc package-x86_64-pc-windows-msvc

    # Do not do versioning for Pre-Release packages
    - name: Rename Pre-Release Packages
      if: ${{ ! startsWith(github.ref, 'refs/tags/') }}
      run: make package-rename

    - name: Pre-Release
      uses: softprops/action-gh-release@v3
      if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/') == false
      with:
        prerelease: true
        name: Continuous Release
        tag_name: continuous-release
        files: |
          bb-imager-gui/dist/*

    - name: Release
      uses: softprops/action-gh-release@v3
      if: startsWith(github.ref, 'refs/tags/')
      with:
        generate_release_notes: false
        files: |
          bb-imager-gui/dist/*

    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      if: github.event_name == 'pull_request'
      with:
        name: artifacts-windows
        path: |
          bb-imager-gui/dist/*
