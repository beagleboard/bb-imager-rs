name: Create Release artifacts

on:
  push:
    branches: [ "main" ]
    tags: [ "[0-9]+.[0-9]+.[0-9]+" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  VERBOSE: 1
  PRE_RELEASE: ${{ github.ref_type != 'tag' && '1' || '0' }}
  VERSION: ${{ github.ref_type == 'tag' && github.ref_name || '' }}

defaults:
  run:
    shell: bash

jobs:
  linux-native-job:
    strategy:
      matrix:
        platform: [ ubuntu-22.04, ubuntu-22.04-arm ]

    name: Build Artifacts - ${{ matrix.platform }}
    runs-on: ${{ matrix.platform }}
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        lfs: true

    - name: Select rust toolchain
      run: rustup toolchain install stable --profile minimal

    - name: Use caching
      uses: Swatinem/rust-cache@v2
      with:
        prefix-key: "v1"
        
    - name: Build packages
      run: make setup-debian-deps setup-packaging-deps package-host

    # Do not do versioning for Pre-Release packages
    - name: Rename Pre-Release Packages
      if: github.ref_type != 'tag'
      run: make package-rename

    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: artifacts-${{ matrix.platform }}
        path: |
          bb-imager-gui/dist/*
          bb-imager-cli/dist/*

  linux-snap-job:
    strategy:
      matrix:
        platform: [ubuntu-24.04, ubuntu-24.04-arm]
        package: [gui, cli]
    name: Build Snaps - ${{ matrix.package }} ${{ matrix.platform }}
    runs-on: ${{ matrix.platform }}
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        lfs: true

    - run: ln -sf snapcraft.${{ matrix.package }}.yaml snapcraft.yaml
    - uses: snapcore/action-build@v1

    - name: Move to dist folders
      run: |
        mkdir -p bb-imager-cli/dist/
        mkdir -p bb-imager-gui/dist/
        mv bb-imager-cli_*.snap bb-imager-cli/dist/ 2>/dev/null || true
        mv bb-imager_*.snap bb-imager-gui/dist/ 2>/dev/null || true

    # Do not do versioning for Pre-Release packages
    - name: Rename Pre-Release Packages
      if: github.ref_type != 'tag'
      run: make package-rename

    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: artifacts-snap-${{ matrix.package }}-${{ matrix.platform }}
        path: |
          bb-imager-gui/dist/*
          bb-imager-cli/dist/*


  linux-cross-job:
    name: Build Artifacts - armv7-unknown-linux-gnueabihf
    runs-on: ubuntu-24.04
    env:
      NO_BUILD: 1
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        lfs: true

    - name: Build binary
      uses: houseabsolute/actions-rust-cross@v1
      with:
        command: build
        target: armv7-unknown-linux-gnueabihf
        args: "--locked --release -F bcf_msp430,bcf_cc1352p7,dfu,zepto_uart,zepto_i2c -p bb-imager-cli"
        strip: true

    - name: Build packages
      run: make setup-packaging-deps package-armv7-unknown-linux-gnueabihf

    # Do not do versioning for Pre-Release packages
    - name: Rename Pre-Release Packages
      if: github.ref_type != 'tag'
      run: make package-rename

    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: artifacts-armv7-unknown-linux-gnueabihf
        path: |
          bb-imager-gui/dist/*
          bb-imager-cli/dist/*

  vendor-deps:
    name: Vendor dependencies
    runs-on: ubuntu-24.04
    if: github.ref_type == 'tag'
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        lfs: true

    - name: Create dependency tar
      run: make vendor-deps

    - name: Release
      uses: softprops/action-gh-release@v3
      with:
        generate_release_notes: true
        files: cargo-vendor.tar.gz

  macos-job:
    name: Build MacOS Artifacts
    runs-on: macos-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        lfs: true

    - name: Setup rust toolchain
      run: |
        rustup toolchain install stable --profile minimal
        rustup target add aarch64-apple-darwin x86_64-apple-darwin

    - name: Use caching
      uses: Swatinem/rust-cache@v2
      with:
        prefix-key: "v2"
        
    # The ENV variable names are what cargo-packager requires
    - name: Setup macos signing
      working-directory: bb-imager-gui
      if: github.event_name != 'pull_request'
      run: |
        echo "" >> Cargo.toml
        echo "[package.metadata.packager.macos]" >> Cargo.toml
        echo "signing_identity = \"${{ secrets.TEAM_ID }}\"" >> Cargo.toml

    - name: Build packages
      env:
        APPLE_CERTIFICATE: ${{ secrets.CERT_DEVELOPER_APP_BASE64 }}
        APPLE_CERTIFICATE_PASSWORD: ${{ secrets.CERT_PASSWORD }}
        APPLE_ID: ${{ secrets.APPLE_ID }}
        APPLE_PASSWORD: ${{ secrets.APP_PASSWORD }}
        APPLE_TEAM_ID: ${{ secrets.TEAM_ID }}
      run: make setup-packaging-deps package-x86_64-apple-darwin package-aarch64-apple-darwin

    # Do not do versioning for Pre-Release packages
    - name: Rename Pre-Release Packages
      if: github.ref_type != 'tag'
      run: make package-rename

    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: artifacts-macos
        path: |
          bb-imager-gui/dist/*

  windows-job:
    name: Build Windows Artifacts
    runs-on: windows-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        lfs: true

    - name: Setup rust toolchain
      run: |
        rustup toolchain install stable --profile minimal
        rustup target add x86_64-pc-windows-msvc aarch64-pc-windows-msvc

    - name: Use caching
      uses: Swatinem/rust-cache@v2
      with:
        prefix-key: "v1"
        
    - name: Build packages
      run: make setup-packaging-deps package-aarch64-pc-windows-msvc package-x86_64-pc-windows-msvc

    # Do not do versioning for Pre-Release packages
    - name: Rename Pre-Release Packages
      if: github.ref_type != 'tag'
      run: make package-rename

    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: artifacts-windows
        path: |
          bb-imager-gui/dist/*

  release:
    name: Upload Release artifacts
    needs:
      - linux-native-job
      - linux-cross-job
      - linux-snap-job
      - macos-job
      - windows-job
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - run: ls -laR artifacts

      - name: Create Pre-Release
        if: github.ref_type != 'tag'
        uses: softprops/action-gh-release@v3
        with:
          prerelease: true
          name: Continuous Release
          tag_name: continuous-release
          files: artifacts/**

      - name: Create Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: false
          files: artifacts/**

      # TODO: Publish GUI for all architectures
      # TODO: Publish GUI to stable
      # TODO: Publish CLI
      - uses: snapcore/action-publish@v1
        if: github.ref_type != 'tag'
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAP_STORE_LOGIN }}
        with:
          snap: artifacts/bb-imager-gui/dist/bb-imager_alpha_amd64.snap
          release: edge
