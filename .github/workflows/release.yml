name: Create Release artifacts

on:
  push:
    branches: [ "main" ]
    tags: [ "[0-9]+.[0-9]+.[0-9]+" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  VERBOSE: 1
  PRE_RELEASE: ${{ github.ref_type != 'tag' && '1' || '0' }}
  VERSION: ${{ github.ref_type == 'tag' && github.ref_name || '' }}

defaults:
  run:
    shell: bash

jobs:
  linux-native-job:
    strategy:
      matrix:
        platform: [ ubuntu-22.04, ubuntu-22.04-arm ]
    name: Build Artifacts - ${{ matrix.platform }}
    runs-on: ${{ matrix.platform }}
    steps:
    - name: Checkout
      uses: actions/checkout@v7
      with:
        lfs: true

    - name: Select rust toolchain
      run: rustup toolchain install stable --profile minimal

    - name: Use caching
      uses: Swatinem/rust-cache@v2
        
    - name: Build packages
      run: make setup-debian-deps setup-packaging-deps package-host

    # Do not do versioning for Pre-Release packages
    - name: Rename Pre-Release Packages
      if: github.ref_type != 'tag'
      run: make package-rename

    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: artifacts-${{ matrix.platform }}
        path: |
          bb-imager-gui/dist/*
          bb-imager-cli/dist/*

  linux-snap-job:
    strategy:
      matrix:
        platform: [ubuntu-24.04, ubuntu-24.04-arm]
    name: Build Snaps - ${{ matrix.platform }}
    runs-on: ${{ matrix.platform }}
    steps:
    - name: Checkout
      uses: actions/checkout@v7
      with:
        lfs: true

    - name: Use caching
      uses: Swatinem/rust-cache@v2
    - run: make vendor

    - run: ln -sf snapcraft.gui.yaml snapcraft.yaml
    - uses: snapcore/action-build@v1

    - run: ln -sf snapcraft.cli.yaml snapcraft.yaml
    - uses: snapcore/action-build@v1

    - name: Move to dist folders
      run: |
        mkdir -p bb-imager-cli/dist/
        mkdir -p bb-imager-gui/dist/
        mv bb-imager-cli_*.snap bb-imager-cli/dist/ 2>/dev/null || true
        mv bb-imager_*.snap bb-imager-gui/dist/ 2>/dev/null || true

    # Do not do versioning for Pre-Release packages
    - name: Rename Pre-Release Packages
      if: github.ref_type != 'tag'
      run: make package-rename

    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: artifacts-snap-${{ matrix.platform }}
        path: |
          bb-imager-gui/dist/*
          bb-imager-cli/dist/*

  linux-snap-cross-job:
    strategy:
      matrix:
        platform: [armhf, riscv64]
    name: Build CLI Snap - ${{matrix.platform}}
    runs-on: ubuntu-24.04
    if: github.event_name != 'pull_request'
    steps:
    - name: Checkout
      uses: actions/checkout@v7
      with:
        lfs: true

    - uses: docker/setup-qemu-action@v4

    - name: Use caching
      uses: Swatinem/rust-cache@v2

    - run: make vendor
    - run: ln -sf snapcraft.cli.yaml snapcraft.yaml
    - uses: canonical/snapcraft-multiarch-action@v1
      with:
        architecture: ${{ matrix.platform }}

    - name: Move to dist folders
      run: |
        mkdir -p bb-imager-cli/dist/
        mv bb-imager-cli_*.snap bb-imager-cli/dist/

    # Do not do versioning for Pre-Release packages
    - name: Rename Pre-Release Packages
      if: github.ref_type != 'tag'
      run: make package-rename

    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: artifacts-snap-cli-${{ matrix.platform }}
        path: |
          bb-imager-cli/dist/*

  linux-cross-job:
    strategy:
      matrix:
        platform: [armv7-unknown-linux-gnueabihf]
    name: Build Artifacts - ${{matrix.platform}}
    runs-on: ubuntu-24.04
    env:
      NO_BUILD: 1
    steps:
    - name: Checkout
      uses: actions/checkout@v7
      with:
        lfs: true

    - name: Build binary
      uses: houseabsolute/actions-rust-cross@v1
      with:
        command: build
        target: ${{matrix.platform}}
        args: "--locked --release -F bcf_msp430,bcf_cc1352p7,dfu,zepto_uart,zepto_i2c -p bb-imager-cli"

    - name: Build packages
      run: make setup-packaging-deps package-${{matrix.platform}}

    # Do not do versioning for Pre-Release packages
    - name: Rename Pre-Release Packages
      if: github.ref_type != 'tag'
      run: make package-rename

    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: artifacts-${{matrix.platform}}
        path: |
          bb-imager-cli/dist/*

  vendor-deps:
    name: Vendor dependencies
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v7
    - name: Create dependency tar
      run: make vendor-deps
    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: vendor-deps
        path: cargo-vendor.tar.zst

  macos-job:
    name: Build MacOS Artifacts
    runs-on: macos-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v7
      with:
        lfs: true

    - name: Setup rust toolchain
      run: |
        rustup toolchain install stable --profile minimal
        rustup target add aarch64-apple-darwin x86_64-apple-darwin

    - name: Use caching
      uses: Swatinem/rust-cache@v2
        
    # The ENV variable names are what cargo-packager requires
    - name: Setup macos signing
      working-directory: bb-imager-gui
      if: github.event_name != 'pull_request'
      run: |
        echo "" >> Cargo.toml
        echo "[package.metadata.packager.macos]" >> Cargo.toml
        echo "signing_identity = \"${{ secrets.TEAM_ID }}\"" >> Cargo.toml

    - name: Build packages
      env:
        APPLE_CERTIFICATE: ${{ secrets.CERT_DEVELOPER_APP_BASE64 }}
        APPLE_CERTIFICATE_PASSWORD: ${{ secrets.CERT_PASSWORD }}
        APPLE_ID: ${{ secrets.APPLE_ID }}
        APPLE_PASSWORD: ${{ secrets.APP_PASSWORD }}
        APPLE_TEAM_ID: ${{ secrets.TEAM_ID }}
      run: make setup-packaging-deps package-x86_64-apple-darwin package-aarch64-apple-darwin

    # Do not do versioning for Pre-Release packages
    - name: Rename Pre-Release Packages
      if: github.ref_type != 'tag'
      run: make package-rename

    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: artifacts-macos
        path: |
          bb-imager-gui/dist/*

  windows-job:
    name: Build Windows Artifacts
    runs-on: windows-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v7
      with:
        lfs: true

    - name: Setup rust toolchain
      run: |
        rustup toolchain install stable --profile minimal
        rustup target add x86_64-pc-windows-msvc aarch64-pc-windows-msvc

    - name: Use caching
      uses: Swatinem/rust-cache@v2
        
    - name: Build packages
      run: make setup-packaging-deps package-aarch64-pc-windows-msvc package-x86_64-pc-windows-msvc

    # Do not do versioning for Pre-Release packages
    - name: Rename Pre-Release Packages
      if: github.ref_type != 'tag'
      run: make package-rename

    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: artifacts-windows
        path: |
          bb-imager-gui/dist/*

  release:
    name: Upload Release artifacts
    needs:
      - linux-native-job
      - linux-cross-job
      - linux-snap-job
      - linux-snap-cross-job
      - macos-job
      - windows-job
      - vendor-deps
    runs-on: ubuntu-latest
    env:
      SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAP_STORE_LOGIN }}
      SNAP_CHANNEL: ${{ github.ref_type == 'tag' && 'stable' || 'edge' }}
    if: github.event_name != 'pull_request'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
      - run: ls -laR artifacts

      - name: Create Pre-Release
        if: github.ref_type != 'tag'
        uses: softprops/action-gh-release@v3
        with:
          prerelease: true
          name: Continuous Release
          tag_name: continuous-release
          files: artifacts/**

      - name: Create Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: artifacts/**

      - name: Install Snapcraft
        uses: samuelmeuli/action-snapcraft@v3

      # TODO: Publish CLI
      - name: Publish Snaps
        run: |
          for pkg in gui; do
            for file in artifacts/bb-imager-$pkg/dist/*.snap; do
              snapcraft upload "$file" --release=$SNAP_CHANNEL;
            done
          done

      - name: Logout from snapcraft
        run: snapcraft logout

  publish-aur:
    name: Publish Package to AUR
    runs-on: ubuntu-latest
    needs:
      - release
    if: github.ref_type == 'tag'
    steps:
      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.AUR_SSH_KEY }}
          # AUR SSH fingerprint: https://aur.archlinux.org/
          known_hosts: 'aur.archlinux.org ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIEuBKrPzbawxA/k2g6NcyV5jmqwJ2s+zpgZGZ7tpLIcN'

      - name: Setup git
        run: |
          git config --global user.email "ayush@beagleboard.org"
          git config --global user.name "Ayush Singh"

      - name: Clone AUR repo
        run: git clone ssh://aur@aur.archlinux.org/bb-imager-cli.git $GITHUB_WORKSPACE

      - name: Validate package
        uses: heyhusen/archlinux-package-action@v2
        with:
          updpkgsums: true
          srcinfo: true
          namcap: true
          pkgver: ${{github.ref_name}}

      - name: Push
        run: |
          git diff
          git add .SRCINFO PKGBUILD
          git commit -m "Update to $VERSION"
          git push
